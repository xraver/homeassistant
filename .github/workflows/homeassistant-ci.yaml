name: Home Assistant CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: read
  packages: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Validate Configuration
    runs-on: ubuntu-latest

    strategy:
      max-parallel: 1
      matrix:
        version: [ "stable", "beta" ]

    steps:
      # ---------------------------------------------------------
      # CHECKOUT
      # ---------------------------------------------------------
      - name: ⤵️ Check out configuration from GitHub
        uses: actions/checkout@v4

      # ---------------------------------------------------------
      # CACHE PIP
      # ---------------------------------------------------------
      - name: ♻️ Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # ---------------------------------------------------------
      # CACHE NPM
      # ---------------------------------------------------------
      - name: ♻️ Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-cache
          restore-keys: |
            ${{ runner.os }}-npm-

      # ---------------------------------------------------------
      # YAML LINT
      # ---------------------------------------------------------
      - name: 🧹 YAML Lint
        run: |
          pip install yamllint
          yamllint -c "./.yamllint/rules.yaml" .

      # ---------------------------------------------------------
      # JSON LINT
      # ---------------------------------------------------------
      - name: 🔍 JSON Lint
        run: |
          sudo npm install -g jsonlint
          find . -name "*.json" -print0 | xargs -0 -I {} jsonlint -q {}

      # ---------------------------------------------------------
      # TEMPLATE VALIDATION (light)
      # ---------------------------------------------------------
      - name: 🧪 Validate Jinja Templates (light)
        run: |
          echo "Checking for malformed Jinja blocks..."
          grep -R "{{" -n . || true

      # ---------------------------------------------------------
      # LOVELACE VALIDATION (light)
      # ---------------------------------------------------------
      - name: 🖼 Validate Lovelace UI (light)
        run: |
          if [ -f ./ui-lovelace.yaml ]; then
            echo "Lovelace file found, basic validation OK"
          fi

      # ---------------------------------------------------------
      # CUSTOM COMPONENTS
      # ---------------------------------------------------------
      - name: ⤵️ Check out Custom Components
        run: |
          mkdir -p custom_components/
          # Monitor Docker
          git clone https://github.com/ualex73/monitor_docker
          mv monitor_docker/custom_components/monitor_docker/ custom_components/

      # ---------------------------------------------------------
      # DUMMY SECRETS
      # ---------------------------------------------------------
      - name: 🔑 Use dummy files as credentials
        run: |
          cp .secrets_dummy.yaml secrets.yaml
          cp credentials/.google_dummy.json credentials/google.json

      # ---------------------------------------------------------
      # FETCH HOME ASSISTANT IMAGE
      # ---------------------------------------------------------
      - name: ⤵️ Fetch Home Assistant Docker Image
        run: |
          docker pull -q "ghcr.io/home-assistant/home-assistant:${{ matrix.version }}"

      # ---------------------------------------------------------
      # HOME ASSISTANT CONFIG CHECK
      # ---------------------------------------------------------
      - name: 🚀 Run Home Assistant Configuration Check
        run: |
          # Show Version
          docker run --rm \
            -v .:/config \
            "ghcr.io/home-assistant/home-assistant:${{ matrix.version }}" \
            python -m homeassistant --version

          # Run check_config
          docker run --rm \
            -v .:/config \
            "ghcr.io/home-assistant/home-assistant:${{ matrix.version }}" \
            python -m homeassistant \
              --config "/config" \
              --script check_config
