######################################################################
# Recorder Configuration
######################################################################

purge_keep_days: 30
auto_purge: true
exclude:
  domains:
    - automation
    - button
    - calendar
    - event
    - group
    - image
    - input_boolean
    - input_datetime
    - input_number
    - input_select
    - input_text
    - script
    - switch
    - update
  entity_globs:
    # Sun & Weather
    - sensor.sun_*
    - sensor.savona_*
    - sensor.morgex_*
    # Dockers
    - sensor.docker_*
  entities:
    # Device Trackers
    - device_tracker.giorgio_s25
